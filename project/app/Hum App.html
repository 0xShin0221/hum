<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hum — App</title>
<link rel="stylesheet" href="app.css" />
<style>
  .stage { position: relative; overflow: hidden; }
  .frames { display: flex; align-items: center; justify-content: center; gap: 56px; flex-wrap: nowrap; width: max-content; }
  .fit { position: absolute; top: 50%; left: 50%; transform-origin: center center; }
  .frame { display: flex; flex-direction: column; align-items: center; gap: 16px; }
  .frame__label { display: flex; align-items: center; gap: 9px; font-family: var(--mono); font-size: 12px; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); }
  .frame__label .dot { width: 6px; height: 6px; }
  .frame__label .dot::after { display: none; }
  @media (max-width: 1200px) { .frames { gap: 36px; } }
</style>
</head>
<body>
  <template id="__bundler_thumbnail" data-bg-color="#060807">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#060807"/>
      <g fill="#12B76A">
        <rect x="516" y="356" width="20" height="88" rx="10"/>
        <rect x="556" y="320" width="20" height="160" rx="10"/>
        <rect x="596" y="280" width="20" height="240" rx="10"/>
        <rect x="636" y="332" width="20" height="136" rx="10"/>
        <rect x="676" y="368" width="20" height="64" rx="10"/>
      </g>
      <text x="600" y="600" text-anchor="middle" fill="#f3f5f4" font-family="-apple-system, Helvetica, sans-serif" font-size="64" font-weight="600" letter-spacing="-2">Hum</text>
    </svg>
  </template>

  <div class="stage">
    <div class="fit" id="fit">
    <div class="frames" id="frames">
      <div class="frame">
        <div class="frame__label"><span class="dot"></span>Desktop · macOS</div>
        <div id="desktop-root"></div>
      </div>
      <div class="frame">
        <div class="frame__label"><span class="dot"></span>Mobile · iOS</div>
        <div id="mobile-root"></div>
      </div>
    </div>
    </div>
  </div>

  <script>
    // fit the fixed-size frames into any viewport (letterbox, never crop)
    (function () {
      function fit() {
        var fitEl = document.getElementById("fit");
        var frames = document.getElementById("frames");
        if (!fitEl || !frames) return;
        var pad = 48;
        var availW = window.innerWidth - pad * 2;
        var availH = window.innerHeight - pad * 2;
        var w = frames.offsetWidth, h = frames.offsetHeight;
        if (!w || !h) return;
        var s = Math.min(1, availW / w, availH / h);
        fitEl.style.transform = "translate(-50%,-50%) scale(" + s + ")";
      }
      window.addEventListener("resize", fit);
      // refit after fonts/layout settle and React mounts
      var n = 0, iv = setInterval(function () { fit(); if (++n > 20) clearInterval(iv); }, 250);
      window.addEventListener("load", fit);
      document.addEventListener("DOMContentLoaded", fit);
    })();
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="dispatch.jsx"></script>
  <script type="text/babel" src="main.jsx"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="mobile.jsx"></script>

  <script type="text/babel" data-presets="react">
    ReactDOM.createRoot(document.getElementById("desktop-root")).render(<HumDesktop />);
    ReactDOM.createRoot(document.getElementById("mobile-root")).render(<HumMobile />);
  </script>
</body>
</html>
